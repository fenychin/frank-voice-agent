<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frank Voice Agent — 小V</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #14141f;
      --border: #2a2a3a;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.3);
      --text: #e2e8f0;
      --text-dim: #64748b;
      --success: #22c55e;
      --error: #ef4444;
      --radius: 16px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
    .header { text-align: center; margin-bottom: 32px; }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .header p { color: var(--text-dim); font-size: 13px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 520px;
    }
    .wake-status {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 24px;
      margin-bottom: 24px;
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .wake-orbs { position: relative; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; }
    .orb {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--border); display: flex; align-items: center; justify-content: center;
      font-size: 28px; transition: all 0.3s; position: absolute;
    }
    .wake-word { position: absolute; top: -28px; left: 50%; transform: translateX(-50%); font-size: 12px; color: var(--accent); white-space: nowrap; font-weight: 600; letter-spacing: 1px; }
    .orb.listening { background: var(--accent); box-shadow: 0 0 30px var(--accent-glow), 0 0 60px var(--accent-glow); animation: orb-pulse 2s infinite; }
    .orb.awakened { background: var(--success); box-shadow: 0 0 30px rgba(34,197,94,0.4); animation: none; }
    @keyframes orb-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    .wake-hint { font-size: 13px; color: var(--text-dim); text-align: center; line-height: 1.5; }
    .wake-hint.active { color: var(--accent); }
    .wake-hint.ok { color: var(--success); font-weight: 600; }
    .transcript-area { min-height: 180px; max-height: 320px; overflow-y: auto; margin-bottom: 20px; padding: 16px; background: rgba(0,0,0,0.3); border-radius: 12px; border: 1px solid var(--border); }
    .transcript-area::-webkit-scrollbar { width: 4px; }
    .transcript-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .msg { margin-bottom: 10px; font-size: 14px; line-height: 1.6; padding: 6px 10px; border-radius: 8px; }
    .msg.user { color: #94a3b8; background: rgba(148,163,184,0.06); }
    .msg.user::before { content: '🎤 '; font-size: 12px; }
    .msg.ops { color: #c4b5fd; background: rgba(99,102,241,0.08); }
    .msg.ops::before { content: '🤖 '; font-size: 12px; }
    .msg.system { color: var(--text-dim); font-size: 12px; font-style: italic; background: transparent; }
    .msg.wake { color: var(--success); font-size: 20px; text-align: center; background: rgba(34,197,94,0.08); }
    .empty { color: var(--text-dim); font-size: 13px; text-align: center; padding: 20px; }
    .mode-toggle { display: flex; gap: 8px; margin-bottom: 20px; }
    .mode-btn { flex: 1; padding: 10px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); border-radius: 10px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .mode-btn.active { border-color: var(--accent); background: var(--accent-glow); color: var(--text); }
    .mode-btn:hover:not(.active) { border-color: #6366f180; }
    .manual-trigger { display: flex; gap: 8px; margin-bottom: 16px; }
    .trigger-btn { flex: 1; padding: 10px; border: 1px solid var(--border); background: rgba(99,102,241,0.1); color: var(--accent); border-radius: 10px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .trigger-btn:hover { background: rgba(99,102,241,0.2); }
    .trigger-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .scene-tags { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .scene-tag { padding: 4px 10px; border-radius: 20px; font-size: 11px; background: rgba(99,102,241,0.1); color: #6366f1; border: 1px solid rgba(99,102,241,0.2); cursor: pointer; transition: all 0.2s; }
    .scene-tag.active { background: var(--accent); color: white; }
    .scene-tag:hover:not(.active) { background: rgba(99,102,241,0.2); }
    .bottom-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
    .copy-btn { padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); border-radius: 8px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
    .copy-btn:hover { border-color: var(--accent); color: var(--text); }
    .copy-btn.copied { border-color: var(--success); color: var(--success); }
    .footer { margin-top: 24px; color: var(--text-dim); font-size: 11px; text-align: center; }
    .footer a { color: #6366f1; text-decoration: none; }
    #audioPlayer { display: none; }
  </style>
</head>
<body>

<div class="header">
  <h1>🤖 Frank Voice Agent</h1>
  <p>叫我「小V小V」即可唤醒</p>
</div>

<div class="card">
  <div class="wake-status">
    <div class="wake-word">小V 小V</div>
    <div class="wake-orbs"><div class="orb" id="orb">👁️</div></div>
    <div class="wake-hint" id="wakeHint">正在启动监听...</div>
  </div>
  <div class="manual-trigger">
    <button class="trigger-btn" id="manualBtn" onclick="manualActivate()">🔔 手动激活（麦克风不可用时）</button>
  </div>
  <div class="scene-tags">
    <span class="scene-tag active" data-scene="通用">✨ 通用</span>
    <span class="scene-tag" data-scene="办公">🏢 办公</span>
    <span class="scene-tag" data-scene="运动">🏃 运动</span>
    <span class="scene-tag" data-scene="驾驶">🚗 驾驶</span>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeVoice" onclick="setMode('voice')">🔊 语音回复</button>
    <button class="mode-btn" id="modeText" onclick="setMode('text')">📝 纯文本输出</button>
  </div>
  <div class="transcript-area" id="transcriptArea"><div class="empty">👆 叫我「小V小V」开始对话</div></div>
  <div class="bottom-bar">
    <span style="font-size:11px;color:var(--text-dim)" id="sessionInfo"></span>
    <button class="copy-btn" id="copyBtn" onclick="copyLastReply()">📋 复制最后回复</button>
  </div>
</div>

<div class="footer">Phase 1 · 云端验证版 · 语音唤醒「小V小V」</div>
<audio id="audioPlayer"></audio>

<script>
const SERVER_URL = window.location.origin;
const WAKE_WORDS = ['小V', '小V小V', '小微微', '微微'];
const $ = id => document.getElementById(id);

let mode = 'voice';
let isAwakened = false, isSpeaking = false, isListening = false;
let lastReply = '', conversationHistory = [], currentScene = '通用';
let wakeRecognition = null, chatRecognition = null;

function initWakeDetection() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { setHint('⚠️ 浏览器不支持语音识别，请用 Chrome', 'error'); $('manualBtn').disabled = false; return; }

  wakeRecognition = new SpeechRecognition();
  wakeRecognition.continuous = true;
  wakeRecognition.interimResults = false;
  wakeRecognition.lang = 'zh-CN';

  wakeRecognition.onresult = (event) => {
    const transcript = event.results[event.results.length - 1][0].transcript.trim();
    if (!isAwakened && WAKE_WORDS.some(w => transcript.includes(w))) {
      wakeRecognition.stop();
      awaken();
    }
  };

  wakeRecognition.onerror = (event) => {
    if (event.error === 'no-speech') return;
    if (event.error === 'network') { setHint('⚠️ 网络错误，语音识别中断', 'error'); setTimeout(() => startWake(), 3000); }
    if (event.error === 'not-allowed') setHint('⚠️ 麦克风权限被拒绝，请允许访问', 'error');
  };

  wakeRecognition.onend = () => { if (!isAwakened && isListening) { try { wakeRecognition.start(); } catch(e) {} } };
  startWake();
}

function startWake() {
  isListening = true;
  setOrb('listening');
  setHint('👂 随时待命，叫我「小V小V」即可');
  try { wakeRecognition.start(); } catch(e) { setTimeout(() => { try { wakeRecognition.start(); } catch(e2) {} }, 1000); }
}

async function awaken() {
  isAwakened = true;
  isListening = false;
  setOrb('awakened');
  setHint('✅ ok — 请说话', 'ok');
  addMsg('wake', '✅ ok');
  if (mode === 'voice') await playTTS('ok');
  setTimeout(() => startChatRecognition(), 500);
}

function startChatRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { addMsg('system', '浏览器不支持语音识别'); resetToWake(); return; }

  chatRecognition = new SpeechRecognition();
  chatRecognition.continuous = false;
  chatRecognition.interimResults = false;
  chatRecognition.lang = 'zh-CN';

  chatRecognition.onresult = async (event) => {
    const transcript = event.results[0][0].transcript.trim();
    if (!transcript) return;
    addMsg('user', transcript);
    await processUserInput(transcript);
  };

  chatRecognition.onerror = (event) => {
    if (event.error === 'no-speech') { resetToWake(); return; }
    addMsg('system', `识别出错: ${event.error}`);
    resetToWake();
  };

  chatRecognition.onend = () => { if (isAwakened) setTimeout(resetToWake, 2000); };
  setHint('🎙️ 正在听...', 'active');
  try { chatRecognition.start(); } catch(e) { console.error(e); }
}

function resetToWake() {
  if (chatRecognition) { try { chatRecognition.stop(); } catch(e) {} chatRecognition = null; }
  isAwakened = false; isListening = false;
  setOrb('listening');
  setHint('👂 随时待命，叫我「小V小V」即可');
  if (wakeRecognition) { try { wakeRecognition.start(); } catch(e) {} }
}

async function processUserInput(text) {
  if (!text.trim()) { resetToWake(); return; }
  try {
    if (mode === 'voice') {
      const res = await fetch(`${SERVER_URL}/api/voice`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text, history: conversationHistory }) });
      if (!res.ok) throw new Error((await res.json()).error || '服务器错误');
      let replyText; try { replyText = decodeURIComponent(res.headers.get('X-Reply-Text') || ''); } catch(e) { replyText = res.headers.get('X-Reply-Text') || ''; }
      lastReply = replyText;
      addMsg('ops', lastReply);
      conversationHistory.push({ role: 'user', content: text }, { role: 'assistant', content: lastReply });
      if (conversationHistory.length > 10) conversationHistory.shift();
      const audioBlob = await res.blob();
      const audio = $('audioPlayer');
      audio.src = URL.createObjectURL(audioBlob);
      audio.onplay = () => { isSpeaking = true; setHint('🔊 播放中...', 'active'); };
      audio.onended = () => { isSpeaking = false; setTimeout(resetToWake, 2000); };
      audio.onerror = () => { isSpeaking = false; setTimeout(resetToWake, 1000); };
      await audio.play();
    } else {
      const res = await fetch(`${SERVER_URL}/api/chat`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text, history: conversationHistory }) });
      if (!res.ok) throw new Error((await res.json()).error || '服务器错误');
      const data = await res.json();
      lastReply = data.reply;
      addMsg('ops', lastReply);
      conversationHistory.push({ role: 'user', content: text }, { role: 'assistant', content: lastReply });
      if (conversationHistory.length > 10) conversationHistory.shift();
      await navigator.clipboard.writeText(lastReply);
      addMsg('system', '📋 已复制到剪贴板');
      setTimeout(resetToWake, 1500);
    }
  } catch(e) { addMsg('system', `❌ ${e.message}`); setTimeout(resetToWake, 2000); }
}

async function playTTS(text) {
  try {
    const res = await fetch(`${SERVER_URL}/api/tts`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
    if (!res.ok) return;
    $('audioPlayer').src = URL.createObjectURL(await res.blob());
    await $('audioPlayer').play();
  } catch(e) { console.warn('TTS error:', e); }
}

function manualActivate() { if (isAwakened) resetToWake(); else awaken(); }

function setOrb(state) {
  const orb = $('orb');
  orb.className = 'orb';
  if (state === 'listening') orb.classList.add('listening');
  else if (state === 'awakened') orb.classList.add('awakened');
  orb.textContent = state === 'awakened' ? '✨' : '👁️';
}

function setHint(text, type = '') {
  const el = $('wakeHint');
  el.textContent = text;
  el.className = 'wake-hint';
  if (type === 'active') el.classList.add('active');
  else if (type === 'ok') el.classList.add('ok');
  else if (type === 'error') el.style.color = 'var(--error)';
}

function addMsg(type, text) {
  const area = $('transcriptArea');
  if (area.querySelector('.empty')) area.querySelector('.empty').remove();
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.textContent = text;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function setMode(m) { mode = m; $('modeVoice').classList.toggle('active', m === 'voice'); $('modeText').classList.toggle('active', m === 'text'); }

function copyLastReply() {
  if (!lastReply) return;
  navigator.clipboard.writeText(lastReply).then(() => {
    const btn = $('copyBtn');
    btn.textContent = '✅ 已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 复制最后回复'; btn.classList.remove('copied'); }, 2000);
  });
}

document.querySelectorAll('.scene-tag').forEach(tag => {
  tag.addEventListener('click', () => {
    document.querySelectorAll('.scene-tag').forEach(t => t.classList.remove('active'));
    tag.classList.add('active');
    currentScene = tag.dataset.scene;
  });
});

window.addEventListener('load', () => {
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    navigator.mediaDevices.getUserMedia({ audio: true }).then(() => initWakeDetection()).catch(() => { setHint('⚠️ 麦克风权限被拒绝，请允许访问后刷新', 'error'); $('manualBtn').disabled = false; });
  } else { setHint('⚠️ 浏览器不支持麦克风，请用 Chrome', 'error'); $('manualBtn').disabled = false; }
});
</script>
</body>
</html>
